services:
  # Go Application
  app:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL Database
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: todo_app
    ports:
      - "5433:5432"  # host:container (5433 to avoid conflict with local postgres)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d todo_app" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin - Database GUI (access at http://localhost:5051)
  pgadmin:
    image: dpage/pgadmin4
    container_name: gin-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"  # changed from 5050 to avoid conflict
    depends_on:
      - db